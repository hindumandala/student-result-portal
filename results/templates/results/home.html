<html>
    <head>
        <title>home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

    <div class="container mt-4"> 
        <!-- container--adds left/right padding--> <!-- margin top size(0-5)-->
        <h1 class="mb-3">welcome {{ request.user.username }}!👋</h1>
        <h4 class="mb-3">All Students</h4> <!-- margin bottom size(0-5)-->
        <table class="table table-bordered table-hover">
            <thead class="table-dark">
            <tr>
                <th>NAME</th>
                <th>ROLLNO</th>
                <th>EMAIL</th>
                <th>Action</th>
            </tr></thead>
            <tbody>
             {% for student in students %} 
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.rollno }}</td>
                <td>{{ student.email }}</td>
                <td><a href="/marks/{{ student.id }}/" class="btn btn-primary btn-sm">Add Marks</a>
                    <a href="/result/{{ student.id }}/" class="btn btn-info btn-sm">Result</a>
                    <a href="/edit/{{student.id}}/">Edit</a>
                    <a href="/delete/{{student.id}}/">Delete</a>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
        <a href="/add/" class="btn btn-success">+ Add Student</a>
        <a href="/logout/" class="btn btn-secondary ms-2">logout</a>
    </div>
    </body>
</html>
